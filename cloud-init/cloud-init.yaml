#cloud-config
package_update: true
packages:
  - git

# Docker-in-LXC: skip br_netfilter check (not loaded on host to avoid
# breaking br0 bridged traffic). Also create /.dockerenv for nested detection.
write_files:
  - path: /etc/systemd/system/docker.service.d/override.conf
    content: |
      [Service]
      Environment="DOCKER_IGNORE_BR_NETFILTER_ERROR=1"
  - path: /.dockerenv
    content: ""

# Debian 13 images: image doesn't include ansible in cloud_final_modules.
# Override with minimal set — packages must run before ansible.
cloud_final_modules:
  - package-update-upgrade-install
  - ansible
  - scripts-user
  - final-message

ansible:
  install_method: distro
  package_name: ansible
  galaxy:
    actions:
      - ["ansible-galaxy", "collection", "install", "git+https://github.com/openclaw/openclaw-ansible.git,main"]
  setup_controller:
    run_ansible:
      - playbook_dir: /root/.ansible/collections/ansible_collections/openclaw/installer
        playbook_name: playbooks/install.yml
        connection: local
        inventory: "localhost,"
        extra_vars: "ansible_become=false openclaw_install_mode=release"
