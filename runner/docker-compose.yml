services:
  github-runner:
    image: myoung34/github-runner:latest
    restart: unless-stopped
    environment:
      RUNNER_NAME: ${RUNNER_NAME}
      RUNNER_REPOSITORY_URL: ${RUNNER_REPOSITORY_URL}
      GITHUB_ACCESS_TOKEN: ${GITHUB_ACCESS_TOKEN}
      RUNNER_WORKDIR: /tmp/github-runner-work
      LABELS: self-hosted,linux,homelab,incus
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/incus/unix.socket:/var/lib/incus/unix.socket
      - /home/michael/claw-machine:/home/michael/claw-machine
      - /tmp/github-runner-work:/tmp/github-runner-work
    group_add:
      - "${INCUS_GID}"
